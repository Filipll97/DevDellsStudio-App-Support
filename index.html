<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Support</title>
  <link rel="stylesheet" href="shared/css/landing.css">
</head>

<body>
  <main class="landing-shell">
    <div class="landing-copy">
      <p class="eyebrow">DevDellsStudio Support Center</p>
      <h1>Support / Privacy / FAQ</h1>
      <p class="subtitle">Select the App you want support for:</p>
    </div>

    <section class="app-grid" aria-label="App support pages">
      <!-- Duplicate one app-card block to add a new app to the landing page. -->
      <a class="app-card" href="sudoku/" aria-label="Open Sudoku365 Classic support">
        <img class="app-card__art" src="shared/icons/appicon.png" alt="Sudoku365 Classic icon">
        <span class="app-card__label">Sudoku365 Classic</span>
      </a>

      <a class="app-card" href="calculator/" aria-label="Open SimplyACalculator support">
        <img class="app-card__art" src="shared/icons/AppIcon 1.png" alt="SimplyACalculator icon">
        <span class="app-card__label">SimplyACalculator</span>
      </a>
    </section>
  </main>
</body>

</html>
